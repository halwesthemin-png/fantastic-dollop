<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>یاساکان</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#241220;
    --bg-deep-2:#3a1930;
    --card:#33182b;
    --card-edge:#4d2440;
    --cream:#f7ead6;
    --cream-dim:#e7cdb5;
    --gold:#e8b84b;
    --gold-dim:#c99a3a;
    --rose:#e08bab;
    --rose-deep:#a94d75;
  }

  * { box-sizing: border-box; }

  html,body{
    margin:0; padding:0; min-height:100%;
    background:
      radial-gradient(circle at 20% 15%, var(--bg-deep-2), transparent 55%),
      radial-gradient(circle at 85% 85%, #4a1f3a, transparent 50%),
      var(--bg-deep);
    font-family:'Vazirmatn', sans-serif;
    color:var(--cream);
    -webkit-tap-highlight-color: transparent;
  }

  .float-heart{
    position:fixed;
    bottom:-10%;
    font-size:1.4rem;
    opacity:0.3;
    color:var(--rose);
    animation: rise linear infinite;
    pointer-events:none;
    user-select:none;
    z-index:0;
  }
  @keyframes rise{
    0%{ transform:translateY(0) rotate(0deg); opacity:0; }
    10%{ opacity:0.35; }
    100%{ transform:translateY(-115vh) rotate(25deg); opacity:0; }
  }

  .stage-wrap{
    position:relative;
    z-index:1;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .card{
    width:100%;
    max-width:440px;
    background: linear-gradient(160deg, var(--card), #291423);
    border:1px solid var(--card-edge);
    border-radius:28px;
    padding:32px 26px 28px;
    text-align:center;
    box-shadow:
      0 0 0 6px rgba(232,184,75,0.06),
      0 20px 60px rgba(0,0,0,0.55);
    position:relative;
    animation: pop-in 0.5s cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes pop-in{
    from{ opacity:0; transform: scale(0.9) translateY(12px); }
    to{ opacity:1; transform: scale(1) translateY(0); }
  }

  .locket{
    width:150px; height:150px;
    margin:0 auto 22px;
    border-radius:50%;
    padding:5px;
    background: conic-gradient(from 0deg, var(--gold), var(--rose-deep), var(--gold-dim), var(--gold));
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .locket img{
    width:100%; height:100%;
    border-radius:50%;
    object-fit:cover;
    display:block;
    background:#1c0e18;
  }

  .stage-label{
    font-size:0.72rem;
    letter-spacing:0.12em;
    color:var(--gold-dim);
    text-transform:uppercase;
    margin-bottom:6px;
    font-weight:600;
  }

  .rules-title{
    font-size:1.3rem;
    font-weight:900;
    color:var(--gold);
    margin-bottom:16px;
  }

  .rules-list{
    text-align:right;
    font-size:1.05rem;
    line-height:2.1;
    color:var(--cream);
    margin:0 0 22px;
    padding-right:4px;
  }

  .question{
    font-size:1.3rem;
    font-weight:700;
    line-height:1.6;
    margin: 6px 0 26px;
    color:var(--cream);
  }

  .btn-row{
    display:flex;
    gap:14px;
    justify-content:center;
    position:relative;
    min-height:56px;
  }

  button{
    font-family:'Vazirmatn', sans-serif;
    font-size:1.05rem;
    font-weight:700;
    padding:14px 26px;
    border-radius:999px;
    border:none;
    cursor:pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  button:active{ transform: scale(0.95); }

  .btn-yes{
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    color:#2b1a0a;
    box-shadow: 0 6px 18px rgba(232,184,75,0.35);
  }
  .btn-yes:hover{ transform: translateY(-2px); box-shadow: 0 10px 24px rgba(232,184,75,0.45); }

  .btn-no{
    background: rgba(255,255,255,0.06);
    color: var(--cream-dim);
    border: 1px solid rgba(255,255,255,0.15);
  }
  .btn-no:hover{ background: rgba(255,255,255,0.1); }

  .btn-no.troll{
    position:fixed;
    transition: top 0.18s ease, left 0.18s ease;
    z-index:50;
  }

  .btn-wide{
    width:100%;
    max-width:260px;
  }

  .challenge-text{
    font-size:1.15rem;
    font-weight:700;
    line-height:1.7;
    color:var(--cream);
    margin-bottom:20px;
  }

  .timer{
    font-size:2.6rem;
    font-weight:900;
    color:var(--gold);
    letter-spacing:0.05em;
    margin-bottom:8px;
    font-variant-numeric: tabular-nums;
  }

  .timer-label{
    font-size:0.8rem;
    color:var(--cream-dim);
    margin-bottom:18px;
  }

  .timer-bar-track{
    width:100%;
    height:8px;
    border-radius:999px;
    background:rgba(255,255,255,0.08);
    overflow:hidden;
    margin-bottom:22px;
  }
  .timer-bar-fill{
    height:100%;
    background: linear-gradient(90deg, var(--gold), var(--rose));
    width:100%;
    transition: width 1s linear;
  }

  .done-text{
    font-size:1.4rem;
    font-weight:900;
    color:var(--gold);
  }

  .hidden{ display:none !important; }

  .progress-dots{
    display:flex;
    gap:7px;
    justify-content:center;
    margin-top:22px;
  }
  .dot{
    width:7px; height:7px; border-radius:50%;
    background: rgba(255,255,255,0.15);
    transition: background 0.3s;
  }
  .dot.active{ background: var(--gold); }

  @media (prefers-reduced-motion: reduce){
    .float-heart{ animation: none; display:none; }
    .card{ animation: none; }
  }
</style>
</head>
<body>

<div class="stage-wrap">
  <div class="card" id="card">

    <!-- STAGE 1: RULES -->
    <div id="screen-rules">
      <div class="rules-title">یاساکان</div>
      <div class="rules-list">
        ۱. نابێت بچیتە دەرەوە تاکو تەواوی نەکەی.<br>
        ۲. دەبێت یاسایەکان جێبەجێ بکەیت.<br>
        ۳. هەر شتێک نوسرابوو ئەبێت بە یاسا.<br><br>
        ئامادەی؟
      </div>
      <button class="btn-yes btn-wide" id="readyBtn">ئامادەم</button>
    </div>

    <!-- STAGE 2: FIRST QUESTION -->
    <div id="screen-q2" class="hidden">
      <div class="locket">
        <img src="https://media1.tenor.com/m/W8HuhlUD31QAAAAd/watching-you-spying.gif" alt="گیف">
      </div>
      <div class="question">ئایا خۆشەویستت هەیە؟</div>
      <div class="btn-row">
        <button class="btn-yes" id="yes2Btn">بەڵێ</button>
        <button class="btn-no" id="no2Btn">نەخێر</button>
      </div>
    </div>

    <!-- STAGE 3: SECOND QUESTION (troll no-button) -->
    <div id="screen-q3" class="hidden">
      <div class="locket">
        <img src="https://media.tenor.com/fvphRD_LUEMAAAAj/bear-angry.gif" alt="گیف">
      </div>
      <div class="question">جارێکیتر نایڵێمەوە، خۆشەویستت هەیە یان نا؟</div>
      <div class="btn-row">
        <button class="btn-yes" id="yes3Btn">بەڵێ</button>
        <button class="btn-no" id="no3Btn">نەخێر</button>
      </div>
    </div>

    <!-- CHALLENGE SCREEN (shown for any بەڵێ press) -->
    <div id="screen-challenge" class="hidden">
      <div class="challenge-text" id="challengeText">
        قلەکەت بڵۆک بکە.
      </div>
      <div class="timer" id="timerDisplay">۰۱:۰۰</div>
      <div class="timer-label">کاتی ماوە</div>
      <div class="timer-bar-track">
        <div class="timer-bar-fill" id="timerBar"></div>
      </div>
      <div class="done-text hidden" id="doneText">کارەکەت تەواو بوو! 🎉</div>
    </div>

  </div>
</div>

<script>
  const rulesScreen = document.getElementById('screen-rules');
  const q2Screen = document.getElementById('screen-q2');
  const q3Screen = document.getElementById('screen-q3');
  const challengeScreen = document.getElementById('screen-challenge');

  const readyBtn = document.getElementById('readyBtn');
  const yes2Btn = document.getElementById('yes2Btn');
  const no2Btn = document.getElementById('no2Btn');
  const yes3Btn = document.getElementById('yes3Btn');
  const no3Btn = document.getElementById('no3Btn');

  const timerDisplay = document.getElementById('timerDisplay');
  const timerBar = document.getElementById('timerBar');
  const doneText = document.getElementById('doneText');
  const challengeText = document.getElementById('challengeText');

  const kurdishDigits = ["۰","۱","۲","۳","۴","۵","۶","۷","۸","۹"];
  function toKurdishNum(n){
    return String(n).split('').map(d => kurdishDigits[d] || d).join('');
  }

  function showScreen(el){
    [rulesScreen, q2Screen, q3Screen, challengeScreen].forEach(s => s.classList.add('hidden'));
    el.classList.remove('hidden');
  }

  function dodge(el){
    const btnW = el.offsetWidth || 100;
    const btnH = el.offsetHeight || 50;
    const margin = 16;
    const maxX = window.innerWidth - btnW - margin;
    const maxY = window.innerHeight - btnH - margin;
    const newX = Math.max(margin, Math.random() * maxX);
    const newY = Math.max(margin, Math.random() * maxY);
    el.style.position = 'fixed';
    el.classList.add('troll');
    el.style.left = newX + 'px';
    el.style.top = newY + 'px';
  }

  function enableTroll(el){
    const rect = el.getBoundingClientRect();
    el.style.position = 'fixed';
    el.classList.add('troll');
    el.style.left = rect.left + 'px';
    el.style.top = rect.top + 'px';
    el.onmouseenter = () => dodge(el);
    el.onclick = (e) => { e.preventDefault(); dodge(el); };
    el.ontouchstart = (e) => { e.preventDefault(); dodge(el); };
  }

  let timerInterval = null;

  function startChallenge(){
    showScreen(challengeScreen);
    doneText.classList.add('hidden');
    timerDisplay.classList.remove('hidden');
    document.querySelector('.timer-label').classList.remove('hidden');
    challengeText.classList.remove('hidden');

    let secondsLeft = 60;
    timerDisplay.textContent = "۰۱:۰۰";
    timerBar.style.width = "100%";

    if(timerInterval) clearInterval(timerInterval);

    timerInterval = setInterval(() => {
      secondsLeft--;
      const mm = Math.floor(secondsLeft / 60);
      const ss = secondsLeft % 60;
      timerDisplay.textContent =
        toKurdishNum(String(mm).padStart(2,'0')) + ":" + toKurdishNum(String(ss).padStart(2,'0'));
      timerBar.style.width = (secondsLeft / 60 * 100) + "%";

      if(secondsLeft <= 0){
        clearInterval(timerInterval);
        challengeText.classList.add('hidden');
        timerDisplay.classList.add('hidden');
        document.querySelector('.timer-label').classList.add('hidden');
        timerBar.parentElement.classList.add('hidden');
        doneText.classList.remove('hidden');
      }
    }, 1000);
  }

  readyBtn.addEventListener('click', () => showScreen(q2Screen));

  yes2Btn.addEventListener('click', startChallenge);
  yes3Btn.addEventListener('click', startChallenge);

  no2Btn.addEventListener('click', () => {
    showScreen(q3Screen);
    enableTroll(no3Btn);
  });

  // background hearts
  function spawnHeart(){
    const heart = document.createElement('div');
    heart.className = 'float-heart';
    heart.textContent = Math.random() > 0.5 ? '♥' : '🤍';
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.fontSize = (0.9 + Math.random()*1.2) + 'rem';
    const duration = 8 + Math.random() * 7;
    heart.style.animationDuration = duration + 's';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), duration * 1000);
  }
  setInterval(spawnHeart, 900);
</script>

</body>
</html>
